# ColdHero：ECS 宿主机 Nginx 示例（同源 HTTPS）
# 使用方式：复制为站点配置，替换 APP_DOMAIN、DIST_ROOT，必要时调整 upstream 端口。
# 与 frontend/nginx.conf（Docker 前端容器）路径逻辑一致，proxy_pass 指向本机后端。
#
# certbot --nginx -d YOUR_DOMAIN 可在 server 块外自动生成 ssl_certificate 指令。

upstream coldhero_backend {
    server 127.0.0.1:4000;
    keepalive 32;
}

server {
    listen 443 ssl http2;
    server_name APP_DOMAIN;

    charset utf-8;

    # ssl_certificate /etc/letsencrypt/live/APP_DOMAIN/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/APP_DOMAIN/privkey.pem;

    root DIST_ROOT;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /api/ {
        proxy_pass http://coldhero_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
        chunked_transfer_encoding on;
    }

    location /ws/ {
        proxy_pass http://coldhero_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 7d;
        proxy_send_timeout 7d;
    }

    location /uploads/ {
        proxy_pass http://coldhero_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml;
    gzip_min_length 1024;
}
